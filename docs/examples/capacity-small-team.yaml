# Example: 3-person startup team.
# Capacities below assume classic SAFe (2-week iterations): 1.0 FTE = 80h.
# For the AI-native default (1-week iterations) halve every
# capacity_per_iteration. Cadence itself is set per-PI in the `pi:` block of
# .edpa/iterations/PI-*.yaml, not here — see docs/cadence.md.

teams:
  - id: "Acme Corp"
    planning_factor: 0.8

people:
  - id: alice
    name: "Alice"
    role: Arch
    team: "Acme Corp"
    fte: 0.5
    capacity_per_iteration: 40
    email: "alice@acme.com"
    availability: confirmed

  - id: bob
    name: "Bob"
    role: Dev
    team: "Acme Corp"
    fte: 1.0
    capacity_per_iteration: 80
    email: "bob@acme.com"
    availability: confirmed

  - id: carol
    name: "Carol"
    role: Dev
    team: "Acme Corp"
    fte: 0.75
    capacity_per_iteration: 60
    email: "carol@acme.com"
    availability: confirmed

# Total: 3 people, 2.25 FTE, 180h/iteration, 720h/PI
