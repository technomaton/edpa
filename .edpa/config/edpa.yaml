templates:
  people: .claude/edpa/templates/people.yaml.tmpl
  heuristics: .claude/edpa/templates/cw_heuristics.yaml.tmpl
  project: .claude/edpa/templates/project.yaml.tmpl
backlog_dir: .edpa/backlog/
iterations_dir: .edpa/iterations/
reports_dir: .edpa/reports/
snapshots_dir: .edpa/snapshots/
pi:
  current: PI-2026-1
  year: 2026
  num: 1
  iteration_weeks: 2
  pi_weeks: 10
  iterations:
  - id: PI-2026-1.1
    dates: 1.4.--14.4.2026
    status: closed
  - id: PI-2026-1.2
    dates: 15.4.--28.4.2026
    status: closed
  - id: PI-2026-1.3
    dates: 29.4.--12.5.2026
    status: closed
  - id: PI-2026-1.4
    dates: 13.5.--26.5.2026
    status: active
  - id: PI-2026-1.5
    dates: 27.5.--9.6.2026
    status: planned
    type: IP
evidence:
  sources:
  - type: git_commits
    pattern: feat|fix|refactor|test|docs
  - type: branch_naming
    pattern: '{type}/{ITEM_ID}-{description}'
  - type: yaml_changes
    file: .edpa/backlog/
    field: assignee
  - type: yaml_changes
    file: .edpa/backlog/
    field: status
cw_roles:
  owner: 1.0
  key: 0.6
  reviewer: 0.3
  consulted: 0.2
  informed: 0.05
validation:
  max_story_js: 8
  require_assignee: true
  require_iteration: true
  require_parent: true
sync:
  github_org: YOUR_ORG
  github_project_number: 0
  sync_interval: 15m
  auto_commit: true
  fields_mapping:
    js: Job Size
    bv: Business Value
    tc: Time Criticality
    rr: Risk Reduction
    wsjf: WSJF Score
    iteration: Iteration
    team: Team
  issue_types:
    Initiative: Business case, investiční záměr
    Epic: Strategický cíl, 6-9 měsíců
    Feature: Musí se vejít do Planning Intervalu
    Story: Dodáváno v iteraci
    Defect: Defekt v existující funkcionalitě
    Task: Technická práce
  github_project_id: ''
