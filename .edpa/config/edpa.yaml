evidence:
  sources:
  - type: git_commits
    pattern: feat|fix|refactor|test|docs
  - type: branch_naming
    pattern: '{type}/{ITEM_ID}-{description}'
  - type: yaml_changes
    file: .edpa/backlog/
    field: assignee
  - type: yaml_changes
    file: .edpa/backlog/
    field: status
cw_roles:
  owner: 1.0
  key: 0.6
  reviewer: 0.3
  consulted: 0.2
  informed: 0.05
validation:
  max_story_js: 8
  require_assignee: true
  require_iteration: true
  require_parent: true
sync:
  github_org: YOUR_ORG
  github_project_number: 0
  sync_interval: 15m
  auto_commit: true
  fields_mapping:
    js: Job Size
    bv: Business Value
    tc: Time Criticality
    rr: Risk Reduction
    wsjf: WSJF Score
    iteration: Iteration
    team: Team
  issue_types:
    Initiative: Business case, investiční záměr
    Epic: Strategický cíl, 6-9 měsíců
    Feature: Musí se vejít do Planning Intervalu
    Story: Dodáváno v iteraci
    Defect: Defekt v existující funkcionalitě
    Task: Technická práce
  github_project_id: ''
