name: Build Plugin Release

on:
  push:
    branches: [main]
    paths:
      - 'plugin/**'
      - '.github/workflows/update-template.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout EDPA
        uses: actions/checkout@v4

      - name: Verify plugin structure
        run: |
          echo "Checking plugin directory..."
          test -f plugin/.claude-plugin/plugin.json || (echo "ERROR: plugin.json missing" && exit 1)
          test -d plugin/skills || (echo "ERROR: skills/ missing" && exit 1)
          test -d plugin/commands || (echo "ERROR: commands/ missing" && exit 1)
          test -d plugin/edpa/scripts || (echo "ERROR: scripts/ missing" && exit 1)
          test -d plugin/edpa/templates || (echo "ERROR: templates/ missing" && exit 1)
          VERSION=$(python3 -c "import json; print(json.load(open('plugin/.claude-plugin/plugin.json'))['version'])")
          echo "Plugin version: ${VERSION}"
          echo "Plugin structure verified."

      - name: Count assets
        run: |
          echo "Skills: $(ls plugin/skills/ | wc -l)"
          echo "Commands: $(ls plugin/commands/edpa/ | wc -l)"
          echo "Scripts: $(ls plugin/edpa/scripts/*.py | wc -l)"
          echo "Templates: $(ls plugin/edpa/templates/ | wc -l)"
          echo "Workflows: $(ls plugin/edpa/workflows/ | wc -l)"
