name: Sync GitHub Projects -> Git

# Event-driven primary trigger + 6-hour safety-net cron.
#
# `projects_v2_item` fires on the org when a Project v2 item is added,
# edited, deleted, or reordered (status / field / iteration change on
# the board). It is the canonical "Project changed" hook and replaces
# the polling cron. Typical kashealth-scale activity is 20-50 events/
# day → ~450-1100 CI min/month, comfortably under the Free plan's
# 2000 min limit; the old `*/15` cron consumed ~1400-2900 min/month.
#
# `cron: '0 */6 * * *'` is the safety net — GitHub occasionally drops
# webhook events and the 4×/day reconciliation guarantees eventual
# consistency without paying the polling tax.
#
# Loop safety: `sync-git-to-projects.yml` uses a PAT to write fields,
# which *does* re-fire `projects_v2_item`. `sync.py pull` is idempotent
# (compares Project state against committed YAMLs and produces 0
# commits when they match), so the back-bounce runs but no-ops — ~30 s
# of CI per round-trip. If the loop ever shows up as a billing pain,
# add a content-marker step before sync-git-to-projects' mutations
# and an `if: !contains(...)` guard here.
on:
  projects_v2_item:
    types: [created, edited, deleted, reordered]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PAT (when configured) for the checkout so the
          # remote URL gets PAT auth and `git push` works without
          # extra credential helper plumbing.
          token: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Warn if PAT not configured
        if: ${{ secrets.EDPA_TOKEN == '' }}
        # GITHUB_TOKEN is always present in CI so the fallback never
        # leaves $GH_TOKEN empty. With only GITHUB_TOKEN, sync.py pull
        # returns 0 items from the Projects v2 GraphQL query and every
        # event/cron tick silently no-ops — surface the cause.
        run: |
          echo "::warning::EDPA_TOKEN secret not configured. Falling back to GITHUB_TOKEN, which cannot read org-scoped GitHub Projects v2. Pull will return 0 items and silently no-op."

      - name: Configure git identity
        # MUST run before sync.py pull --commit because the script
        # auto-commits and would fail with "Please tell me who you are".
        run: |
          git config user.name "EDPA Sync Bot @ TECHNOMATON"
          git config user.email "edpa-bot@noreply.technomaton.com"

      - name: Sync Projects to Git
        env:
          GH_TOKEN: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .claude/edpa/scripts/sync.py pull --commit

      - name: Push changes
        # sync.py pull --commit already created N commits when pulled
        # changes existed; git push is a no-op ("Everything up-to-date")
        # when there's nothing new — safe to always invoke.
        run: git push
