name: EDPA collision check

# Detect EDPA ID collisions on PRs touching .edpa/backlog/. When found, comment
# on the PR with instructions for the dev to resolve locally using
# renumber_collisions.py, and mark the PR check as failed.
#
# Trigger: any PR that adds/modifies files under .edpa/backlog/.
# Requires: .edpa/engine/scripts/renumber_collisions.py vendored in the repo
# (installed by `bash install.sh` or `/edpa:setup`).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.edpa/backlog/**'
      - '.edpa/config/id_counters.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  collision-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for merge-base calculation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Detect ID collisions
        id: check
        run: |
          set +e
          python3 .edpa/engine/scripts/renumber_collisions.py \
            --check \
            --target "${{ github.base_ref }}" \
            > collision-output.txt 2>&1
          RC=$?
          cat collision-output.txt
          echo "rc=${RC}" >> $GITHUB_OUTPUT
          if [ "${RC}" -eq 0 ]; then
            echo "result=clean" >> $GITHUB_OUTPUT
          else
            echo "result=collisions" >> $GITHUB_OUTPUT
          fi
          exit 0  # let next step handle PR comment + final fail

      - name: Comment on PR if collisions
        if: steps.check.outputs.result == 'collisions'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('collision-output.txt', 'utf8');
            const body = [
              '## ⚠ EDPA ID Collision Detected',
              '',
              'A backlog item ID in this PR already exists on `' +
                context.payload.pull_request.base.ref + '`.',
              '',
              '<details><summary>Detection output</summary>',
              '',
              '```',
              output.trim(),
              '```',
              '',
              '</details>',
              '',
              '### To fix locally',
              '',
              '```bash',
              'git fetch origin',
              'python3 .edpa/engine/scripts/renumber_collisions.py --apply',
              'git add .',
              'git commit -m "renumber: resolve collision with ' +
                context.payload.pull_request.base.ref + '"',
              '# If id_counters.yaml conflicts when merging base back in,',
              '# resolve by taking the higher value (max of both sides).',
              'git push --force-with-lease',
              '```',
              '',
              'See `docs/dev-collisions.md` for the full workflow.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail check if collisions
        if: steps.check.outputs.result == 'collisions'
        run: |
          echo "::error::EDPA ID collision detected. See PR comment for resolution."
          exit 1
