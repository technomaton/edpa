name: Skill E2E (nightly)

# Layer 3 of docs/E2E-SKILLS-TEST-PLAN.md: drives the working-tree plugin
# through headless `claude -p` (tests/test_skill_e2e.py, marker skill_e2e).
# Spawns real Claude Code => needs the ANTHROPIC_API_KEY repo secret and
# costs API tokens; runs nightly + on demand, never on PR. Without the
# secret every step no-ops, so forks stay green.

on:
  schedule:
    - cron: "30 2 * * *"   # 02:30 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skill-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check ANTHROPIC_API_KEY secret
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY secret not set — skipping skill E2E"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node (for Claude Code CLI)
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: |
          pip install -r requirements-dev.txt
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run skill E2E
        if: steps.gate.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EDPA_SKILL_E2E: "1"
        run: |
          git config --global user.name "edpa-ci"
          git config --global user.email "edpa-ci@example.com"
          pytest tests/test_skill_e2e.py -m skill_e2e -v --tb=short
