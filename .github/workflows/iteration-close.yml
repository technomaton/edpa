name: EDPA Iteration Close

on:
  workflow_dispatch:
    inputs:
      iteration_id:
        description: 'Iteration ID (e.g., PI-2026-1.3)'
        required: true
        type: string
      mode:
        description: 'Calculation mode'
        required: false
        default: 'simple'
        type: choice
        options:
          - simple
          - full

jobs:
  close-iteration:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml openpyxl

      - name: Verify configuration
        run: |
          if [ ! -f .edpa/config/capacity.yaml ]; then
            echo "ERROR: .edpa/config/capacity.yaml not found. Run /edpa setup first."
            exit 1
          fi
          if [ ! -f .edpa/config/heuristics.yaml ]; then
            echo "ERROR: .edpa/config/heuristics.yaml not found. Run /edpa setup first."
            exit 1
          fi
          echo "Configuration verified."

      - name: Run EDPA Engine
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ITERATION_ID: ${{ inputs.iteration_id }}
          MODE: ${{ inputs.mode }}
        run: |
          python3 .claude/edpa/scripts/engine.py \
            --iteration "$ITERATION_ID" \
            --mode "$MODE" \
            --capacity .edpa/config/capacity.yaml \
            --heuristics .edpa/config/heuristics.yaml

      - name: Verify invariants
        run: |
          RESULTS=".edpa/reports/iteration-${{ inputs.iteration_id }}/edpa_results.json"
          if [ ! -f "$RESULTS" ]; then
            echo "ERROR: Engine did not produce results."
            exit 1
          fi
          python3 -c "
          import json, sys
          with open('$RESULTS') as f:
              data = json.load(f)
          if not data.get('all_invariants_passed'):
              print('INVARIANT FAILURE — check results')
              sys.exit(1)
          print('All invariants passed.')
          "

      - name: Commit results
        run: |
          git config user.name "EDPA Bot"
          git config user.email "edpa@github-actions"
          git add .edpa/reports/ .edpa/snapshots/
          git commit -m "feat(edpa): close iteration ${{ inputs.iteration_id }}" || echo "No changes to commit"
          git push
