# EDPA E2E V2 sandbox people registry.
# Seeded into .edpa/config/people.yaml by the e2e test harness. Four
# distinct humans, five entries — Bob carries two contracts (Arch +
# PM, shared name/email/github) to exercise the multi-role split.
# Total capacity per iteration must sum to exactly 144 hours, which
# Wave C asserts as an invariant.

# Single team for the synthetic project; planning_factor 0.8 leaves
# 20% buffer per the AI-native defaults.
teams:
  - id: core
    planning_factor: 0.8

# Team members — four humans, five contracts. Bob Brown is split
# across an Arch contract (32h) and a PM contract (8h). Both share
# name + email + github handle but each has its own id so per-role
# capacity invariants hold separately.
people:
