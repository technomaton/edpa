# EDPA V2 end-to-end test fixture: 10-iteration plan for 2 Program Increments.
#
# Cadence:
#   - 1-week iterations (Monday -> Sunday, ISO weekday boundaries).
#   - 5 iterations per PI = 4 delivery + 1 IP (Innovation & Planning).
#   - PI-1 spans 2026-01-05 -> 2026-02-08 (5 weeks).
#   - PI-2 spans 2026-02-09 -> 2026-03-15 (5 weeks).
#   - Total horizon: 10 contiguous weeks, no gaps.
#
# Schema:
#   iterations[]:
#     id           Iteration identifier (PI-YYYY-P.I).
#     pi           Parent PI identifier (PI-YYYY-P).
#     start_date   ISO 8601 date (Monday).
#     end_date     ISO 8601 date (Sunday).
#     type         delivery | ip
#     weeks        Integer; always 1 for this fixture.
#     status       planned | active | closed (initial: planned).
#     planning:
#       capacity      Team capacity in hours (144 = sum of per-iteration
#                     capacity from fixtures/people.yaml: alice 40 +
#                     bob-arch 32 + bob-pm 8 + carol 40 + dave 24 = 144).
#       planned_sp    Planned story points (0 at fixture load time).
#     notes        Short human-readable description.
#
# Wave B worker reads this file and invokes MCP edpa_iteration_create per
# entry. The MCP tool expects type in {"Iteration", "IP"}; map the fixture's
# lowercase value before calling: delivery -> "Iteration", ip -> "IP".
#
# Loadable via yaml.safe_load (YAML 1.2, 2-space indent).
iterations:
  - id: PI-2026-1.1
    pi: PI-2026-1
    start_date: "2026-01-05"
    end_date: "2026-01-11"
    type: delivery
    weeks: 1
    status: planned
    planning:
      capacity: 144
      planned_sp: 0
    notes: "First delivery iteration of PI-1"

  - id: PI-2026-1.2
    pi: PI-2026-1
    start_date: "2026-01-12"
