# EDPA E2E V2 sandbox project configuration.
# Used by the end-to-end test harness in tests/e2e_v2_full/ to seed
# .edpa/config/edpa.yaml in a fresh sandbox repo before driving the
# install -> add -> close -> report flow against synthetic GitHub data.

project:
  name: "EDPA E2E Pilot"
  description: "Synthetic end-to-end test sandbox for EDPA V2 verification"
  domain: "test"

  # Funding window spans both Program Increments simulated by the test
  # (PI-2026-1 runs 2026-01-05 -> 2026-02-08, PI-2026-2 runs 2026-02-09
  # -> 2026-03-15). Period dates are inclusive of the first delivery
  # iteration through the last IP iteration.
  funding:
    program: "internal-validation"
    registration: ""
    period_start: "2026-01-05"
    period_end: "2026-03-15"

  # Single vendor organization — the test does not exercise multi-org
  # invoicing today. Address + contact deliberately left blank so the
  # fixture remains synthetic.
  organizations:
    - name: "TECHNOMATON"
      legal_name: "TECHNOMATON s.r.o."
      role: "vendor"
      tax_id: ""
      vat_id: ""
      address:
        street: ""
        city: ""
        postal_code: ""
        country: "CZ"
      contact:
        email: ""
        phone: ""
        website: ""

governance:
  methodology: "EDPA 2.1.2"

# Pin engine to the vendored version installed by the test harness —
# auto-update would otherwise re-vendor mid-test and invalidate the
# fixture snapshot.
auto_update_engine: false

naming:
  pi_pattern: "PI-{year}-{pi_num}"
  iteration_pattern: "PI-{year}-{pi_num}.{iter_num}"
  branch_pattern: "feature/{id}"
  item_prefixes:
    initiative: "I"
    epic: "E"
    feature: "F"
    story: "S"
    task: "T"
    defect: "D"
    event: "EV"

# Native GitHub Issue Types (org-level, not labels)
issue_types:
  Initiative: "Business case, investment proposal"
  Epic: "Strategic goal, 6-9 months"
  Feature: "Must fit within a Planning Interval"
  Story: "Delivered in an iteration"
  Defect: "Defect in existing functionality"
  Task: "Technical work"

# Enabler is a label classification (Business vs Enabler), not an Issue Type
labels:
  Enabler: "Infrastructure, research, technical debt"
