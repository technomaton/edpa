    tc: 6
    rr: 5
    parent: "#1"
    assignee: alice
    description: |
      Polish per-person and per-item reports so accountants and PMs can
      consume them without a Python REPL. Adds PI summary rollup and
      CSV timesheets for downstream payroll integration.

  # ----- #4 Feature — Calibration MAD regression guard ---------------------
