    title: "Calibration MAD regression guard"
    js: null
    bv: 8
    tc: 8
    rr: 3
    parent: "#2"
    assignee: bob-arch
    description: |
      CI check that runs the Monte-Carlo calibration synthetic corpus
      on every PR touching cw_heuristics.yaml.tmpl and fails if MAD
      regresses past the recorded baseline.

