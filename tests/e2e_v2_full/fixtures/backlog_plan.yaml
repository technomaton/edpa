# EDPA V2 — E2E full-flow backlog plan fixture
#
# Declarative seed data consumed by the Wave B worker to populate the
# sandbox backlog via `edpa:add` (preferred) or MCP `edpa_item_create`.
#
# Parent reference scheme
# -----------------------
# Each item is identified by its 1-indexed position in the `items` list.
# The `parent` field uses a `#N` token (string) referring to that position.
# The Wave B worker resolves these tokens to real EDPA IDs (I-1, E-1,
# F-1, ...) at seed time after each create call returns its allocated ID.
#
# Index map for quick reference:
#   #1                 — Initiative I1 (root)
#   #2,  #3            — Epics      (E1, E2)        parent: #1
#   #4,  #5            — Features   (F1, F2)        parent: #2 (E1)
#   #6,  #7            — Features   (F3, F4)        parent: #3 (E2)
#   #8..#12            — Stories    (5 under F1)    parent: #4
#   #13..#17           — Stories    (5 under F2)    parent: #5
#   #18..#22           — Stories    (5 under F3)    parent: #6
#   #23..#27           — Stories    (5 under F4)    parent: #7
#   #28                — Defect D1                  parent: #5 (F2)
#   #29                — Defect D2                  parent: #6 (F3)
#   #30, #31           — Events                     parent: #1 (I1)
#   #32, #33           — Risks                      parent: #2 (E1)
#
# Totals: 1 Initiative + 2 Epics + 4 Features + 20 Stories + 2 Defects
#        + 2 Events + 2 Risks = 33 items.
#
# Iteration distribution (delivery iterations only — IP iterations .5 stay empty):
#   PI-2026-1.1 .. 1.4 and PI-2026-2.1 .. 2.4 (8 delivery iterations).
#   Stories spread roughly evenly (~2-3 each); defects land mid-PI on .4.
#
# Assignees must match people.yaml ids: alice, bob-arch, bob-pm, carol, dave.
# (bob-arch and bob-pm are the same human "Bob" wearing two roles.)
items:
  # ----- #1 Initiative -----------------------------------------------------
  - type: Initiative
    title: "EDPA V2 Production Hardening"
    js: null
    bv: 13
    tc: 13
    rr: 8
    parent: null
    assignee: bob-pm
    description: |
      Strategic initiative to harden EDPA V2 for production rollout
      across pilot teams. Covers engine reliability, reports UX, and
      evidence-storage compliance work that must land before EDPA is
      promoted from "pilot" to "default" governance layer.

  # ----- #2 Epic — Engine reliability + observability ----------------------
  - type: Epic
    title: "Engine reliability + observability"
    js: null
    bv: 10
    tc: 10
    rr: 5
    parent: "#1"
    assignee: bob-arch
    description: |
      Make the EDPA engine resilient to GitHub API rate limits,
      file-lock contention, and partial-iteration failures. Adds the
      observability needed to debug calibration drift in real pilots.

  # ----- #3 Epic — Reports UX + multi-format export ------------------------
  - type: Epic
    title: "Reports UX + multi-format export"
    js: null
