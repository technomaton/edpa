# EDPA V2 end-to-end test — work simulation plan.
#
# Declarative per-iteration work plan consumed by the Wave B drivers
# (Phase 07 commit synthesizer, Phase 08 PR/review/comment synthesizer).
# Each iteration lists which backlog items (#N refs to backlog_plan.yaml)
# are worked on, who commits, who reviews, who comments, and exact day
# offsets / wall times so the resulting git+GitHub state is reproducible.
#
# Reference scheme
# ----------------
# Item refs use the #N token that points to the 1-indexed position in
# fixtures/backlog_plan.yaml. Wave B resolves the token to the real
# EDPA item id (S-1, S-2, ...) allocated at create-time and substitutes
# the placeholder in commit messages and PR titles. Until substitution,
# commit messages and PR titles use the position-based pseudo-id
# `<item_id>` as a literal placeholder — Wave B MUST replace it before
# pushing.
#
# Day offset semantics
# --------------------
#   day_offset 0 == iteration.start_date (Monday)
#   day_offset 1 == Tuesday
#   day_offset 2 == Wednesday
#   day_offset 3 == Thursday
#   day_offset 4 == Friday
#   day_offset 5 == Saturday
#   day_offset 6 == Sunday (iteration.end_date)
# Wave B adds day_offset to start_date and combines with `time` (UTC).
#
# Item distribution
# -----------------
# Aligned with the `target_iteration` field already declared on each
# Story / Defect in backlog_plan.yaml. Coverage:
#   PI-2026-1.1 .. 1.4   8 delivery iters → 22 Stories+Defects total
#   PI-2026-1.5, 2.5     IP iters         → 1 Event each (light load)
#   PI-2026-2.1 .. 2.4   delivery iters   → continued from above
#
# Total simulated items across all iterations: 24
#   = 20 Stories (#8..#27 every Story in the backlog)
#   + 2  Defects  (#28 = D1 mid PI-1, #29 = D2 mid PI-2)
#   + 2  Events   (#30 = EV1 retro in PI-1 IP, #31 = EV2 compliance in PI-2 IP)
#
# Reviewer pool: alice, bob-arch, carol, dave (minus the assignee).
# bob-pm rarely reviews (PM role) — instead carries the role of
# tracking commenter on most PRs.
#
# Loadable via yaml.safe_load (YAML 1.2, 2-space indent).
