name: Sync GitHub Projects -> Git

# Business-hours polling cron + manual dispatch.
#
# Note: `projects_v2_item` is an organization webhook event, NOT a
# workflow trigger — GitHub Actions cannot subscribe to Project v2
# board changes directly. Sync runs on a schedule and reconciles
# Project state against committed YAMLs.
#
# `cron: '*/30 6-17 * * 1-5'` = every 30 min, UTC hours 6-17, Mon-Fri.
# UTC 6-17 covers Czech business hours 8-18 in both CET (winter, UTC+1)
# and CEST (summer, UTC+2) — minor seasonal overflow in either
# direction, but the full 8-18 local window is always covered.
# ~528 CI min/month, ~26% of the 2000-min Free plan limit.
#
# Outside business hours / on weekends sync pauses; use
# `workflow_dispatch` for manual on-demand reconciliation, or wait
# until the next business-day cron tick (max ~14h latency between
# Friday 18:00 and Monday 08:00 local).
#
# Loop safety: `sync-git-to-projects.yml` writes Project fields when
# YAMLs change. The cron-based pull is idempotent (compares Project
# state against committed YAMLs, produces 0 commits when they match),
# so there's no event loop to guard against — only the cost of two
# scheduled jobs reconciling the same state.
on:
  schedule:
    - cron: '*/30 6-17 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PAT (when configured) for the checkout so the
          # remote URL gets PAT auth and `git push` works without
          # extra credential helper plumbing.
          token: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Warn if PAT not configured
        env:
          PAT: ${{ secrets.EDPA_TOKEN }}
        if: env.PAT == ''
        # GITHUB_TOKEN is always present in CI so the fallback never
        # leaves $GH_TOKEN empty. With only GITHUB_TOKEN, sync.py pull
        # returns 0 items from the Projects v2 GraphQL query and every
        # cron tick silently no-ops — surface the cause.
        run: |
          echo "::warning::EDPA_TOKEN secret not configured. Falling back to GITHUB_TOKEN, which cannot read org-scoped GitHub Projects v2. Pull will return 0 items and silently no-op."

      - name: Configure git identity
        # MUST run before sync.py pull --commit because the script
        # auto-commits and would fail with "Please tell me who you are".
        run: |
          git config user.name "EDPA Sync Bot @ TECHNOMATON"
          git config user.email "edpa-bot@noreply.technomaton.com"

      - name: Sync Projects to Git
        env:
          GH_TOKEN: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .edpa/engine/scripts/sync.py pull --commit

      - name: Push changes
        # Only push when sync.py pull --commit actually created local
        # commits beyond origin/main. Skipping the push when there is
        # nothing to send avoids surfacing transient auth failures
        # (mis-scoped PATs, ephemeral org policy hiccups) as red CI
        # for what is logically a no-op.
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline 2>/dev/null)" ]; then
            git push
          else
            echo "No new commits — nothing to push."
          fi
