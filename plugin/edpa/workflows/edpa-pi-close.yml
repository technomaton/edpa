# EDPA PI Close
# Manual trigger: aggregate iteration results into PI-level summary
name: EDPA PI Close

on:
  workflow_dispatch:
    inputs:
      pi_id:
        description: 'PI ID (e.g., PI-2026-1)'
        required: true
        type: string

jobs:
  close-pi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Warn if PAT not configured
        if: ${{ secrets.EDPA_TOKEN == '' }}
        # pi_close.py reads org-scoped Project v2 data via GraphQL.
        # Without EDPA_TOKEN, the default GITHUB_TOKEN silently returns
        # zero items and the PI summary is empty. Surface the cause.
        run: |
          echo "::warning::EDPA_TOKEN secret not configured. Falling back to GITHUB_TOKEN, which cannot read org-scoped GitHub Projects v2. PI summary may be empty."

      - name: Configure git identity
        # MUST run before any step that auto-commits, otherwise git
        # fails with "Please tell me who you are".
        run: |
          git config user.name "EDPA Bot @ TECHNOMATON"
          git config user.email "edpa-bot@noreply.technomaton.com"

      - name: Aggregate PI metrics
        env:
          PI_ID: ${{ inputs.pi_id }}
          GH_TOKEN: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .claude/edpa/scripts/pi_close.py --pi "$PI_ID"

      - name: Commit PI report
        run: |
          git add .edpa/reports/pi-${{ inputs.pi_id }}/
          if git diff --cached --quiet; then
            echo "No PI report changes"
          else
            git commit -m "feat(edpa): close PI ${{ inputs.pi_id }}"
            git push
          fi
