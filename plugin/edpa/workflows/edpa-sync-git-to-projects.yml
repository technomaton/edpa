name: Sync Git -> GitHub Projects

on:
  push:
    paths:
      - ".edpa/backlog/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip if the push was from the sync bot (prevent loops).
    # The bot exclusion does NOT apply on workflow_dispatch — manual
    # runs are always intentional.
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need previous commit for diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Warn if PAT not configured
        env:
          PAT: ${{ secrets.EDPA_TOKEN }}
        if: env.PAT == ''
        # GITHUB_TOKEN is always present in CI, so a $-empty check would
        # never trigger. The real failure mode is "PAT missing AND
        # GITHUB_TOKEN can't reach Projects v2" — sync.py will 403 on
        # the first GraphQL mutation. Surface the cause up-front.
        run: |
          echo "::warning::EDPA_TOKEN secret not configured. Falling back to GITHUB_TOKEN, which cannot write to org-scoped GitHub Projects v2. Expect 403 errors below."

      - name: Sync Git to Projects
        env:
          GH_TOKEN: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .edpa/engine/scripts/sync.py push
