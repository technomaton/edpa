name: EDPA Iteration Close

on:
  workflow_dispatch:
    inputs:
      iteration_id:
        description: 'Iteration ID (e.g., PI-2026-1.3)'
        required: true
        type: string

jobs:
  close-iteration:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml openpyxl

      - name: Verify configuration
        run: |
          test -f .edpa/config/people.yaml || (echo "ERROR: Run /edpa setup first." && exit 1)
          test -f .edpa/config/heuristics.yaml || (echo "ERROR: Run /edpa setup first." && exit 1)

      - name: Warn if PAT not configured
        if: ${{ secrets.EDPA_TOKEN == '' }}
        # engine.py reads org-scoped Project v2 evidence (commits, PRs,
        # comments) via GraphQL. Without EDPA_TOKEN, the default
        # GITHUB_TOKEN cannot reach Projects v2 and CW evidence will be
        # incomplete. Surface the cause up-front.
        run: |
          echo "::warning::EDPA_TOKEN secret not configured. Falling back to GITHUB_TOKEN, which cannot read org-scoped GitHub Projects v2. Iteration close may have incomplete evidence."

      - name: Configure git identity
        # MUST run before any step that auto-commits, otherwise git
        # fails with "Please tell me who you are".
        run: |
          git config user.name "EDPA Bot @ TECHNOMATON"
          git config user.email "edpa-bot@noreply.technomaton.com"

      - name: Run EDPA Engine
        env:
          GH_TOKEN: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python3 .claude/edpa/scripts/engine.py \
            --iteration "${{ inputs.iteration_id }}" \
            --edpa-root .edpa

      - name: Verify invariants
        run: |
          RESULTS=".edpa/reports/iteration-${{ inputs.iteration_id }}/edpa_results.json"
          test -f "$RESULTS" || (echo "ERROR: No results." && exit 1)
          python3 -c "
          import json, sys
          with open('$RESULTS') as f:
              data = json.load(f)
          if not data.get('all_invariants_passed'):
              sys.exit(1)
          "

      - name: Commit results
        run: |
          git add .edpa/reports/ .edpa/snapshots/
          git commit -m "feat(edpa): close iteration ${{ inputs.iteration_id }}" || true
          git push
