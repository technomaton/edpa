# EDPA Contributor Auto-Detection
# On PR merge: scan commits/reviews, update backlog YAML contributors
name: EDPA Contributor Detection

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  # When ANY permission is set explicitly, all unspecified ones default
  # to `none`. The script calls `gh pr view` and reads issue assignee /
  # comment data, so we must restore read access for both.
  pull-requests: read
  issues: read

jobs:
  detect-contributors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Configure git identity
        # MUST run before any step that auto-commits, otherwise git
        # fails with "Please tell me who you are".
        run: |
          git config user.name "EDPA Bot @ TECHNOMATON"
          git config user.email "edpa-bot@noreply.technomaton.com"

      - name: Detect contributors from PR
        env:
          GH_TOKEN: ${{ secrets.EDPA_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: python3 .edpa/engine/scripts/detect_contributors.py

      - name: Commit updated backlog
        run: |
          git add .edpa/backlog/
          if git diff --cached --quiet; then
            echo "No contributor changes detected"
          else
            git commit -m "chore(edpa): auto-detect contributors from PR #${PR_NUMBER}"
            git push
          fi
