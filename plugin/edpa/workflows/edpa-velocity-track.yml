# EDPA Velocity Tracker
# On iteration update: recompute velocity trend across all closed iterations
name: EDPA Velocity Tracker

on:
  push:
    branches: [main]
    paths:
      - '.edpa/iterations/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-velocity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Configure git identity
        # MUST run before any step that auto-commits, otherwise git
        # fails with "Please tell me who you are".
        run: |
          git config user.name "EDPA Bot @ TECHNOMATON"
          git config user.email "edpa-bot@noreply.technomaton.com"

      - name: Compute velocity report
        run: python3 .edpa/engine/scripts/velocity.py

      - name: Commit velocity report
        run: |
          git add .edpa/reports/velocity/
          if git diff --cached --quiet; then
            echo "No velocity changes"
          else
            git commit -m "chore(edpa): update velocity report"
            git push
          fi
