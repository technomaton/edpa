[pytest]
addopts = -m "not e2e"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: end-to-end tests against real GitHub (opt-in: pytest -m e2e). Requires EDPA_E2E_REPO env var and gh auth.
    skill_e2e: skill-driven E2E via headless `claude -p` (opt-in: EDPA_SKILL_E2E=1 + claude on PATH). Spawns real Claude Code — API cost, minutes of wall time. Run: EDPA_SKILL_E2E=1 pytest -m skill_e2e.
